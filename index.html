
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<script>
// مفتاح تشفير داخلي للموقع مالتك
const SECRET_KEY = "BlackStoreKey2026"; 

// 1. الدالة المصلحة والجاهزة للاتصال بـ Gemini الحقيقي (تم تصليح الـ function)
async function sendMessageToGemini(userMessage) {
    console.log("🚀 جاري الاتصال بجوجل Gemini الحقيقي...");

    // الرابط الرسمي الصحيح 100% من جوجل
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;

    try {
        const response = await fetch(url, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                contents: [{ parts: [{ text: userMessage }] }]
            })
        });

        const data = await response.json();
        
        // استخراج الجواب الحقيقي القادم من سيرفرات جوجل
        let aiReply = data.candidates[0].content.parts[0].text;
        
        // 2. تشفير الرسالة والجواب لحفظهم بملف آمن .enc
        let encryptedUserMsg = CryptoJS.AES.encrypt(userMessage, SECRET_KEY).toString();
        let encryptedAiReply = CryptoJS.AES.encrypt(aiReply, SECRET_KEY).toString();
        
        // تشغيل دالة حفظ الملف
        createEncryptedFile(encryptedUserMsg, encryptedAiReply);

        console.log("✅ تم استلام الجواب بنجاح!");
        return aiReply; 

    } catch (error) {
        console.error("❌ حدث خطأ أثناء الاتصال بالـ AI:", error);
        return "تأكد من كتابة مفتاح الـ API بشكل صحيح في ملف config.js";
    }
}

// دالة صناعة وحفظ ملف الـ .enc للمحادثة
function createEncryptedFile(userMsgEnc, aiReplyEnc) {
    const fileStructure = {
        "file_type": "black_store_ai_session",
        "timestamp": new Date().toISOString(),
        "chat_payload": [
            { "sender": "user", "content_encrypted": userMsgEnc },
            { "sender": "ai_assistant", "content_encrypted": aiReplyEnc }
        ]
    };
    console.log("💾 صيغة الملف المشفر جاهزة:", fileStructure);
}
            </script>
